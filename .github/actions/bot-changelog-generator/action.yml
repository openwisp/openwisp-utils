name: "OpenWISP Changelog Generator"
description: "Analyzes a PR and generates a squash-merge commit message suggestion"
author: "OpenWISP"

inputs:
  github-token:
    description: "GitHub token for API access"
    required: true
  gemini-api-key:
    description: "Google Gemini API key"
    required: true
  pr-number:
    description: "Pull request number to analyze"
    required: true
  repo-name:
    description: "Repository name in format owner/repo"
    required: true
  cache-dependency-path:
    description: "Path to dependency metadata used for pip cache invalidation"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python with cache
      if: ${{ inputs.cache-dependency-path != '' }}
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: "pip"
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Set up Python
      if: ${{ inputs.cache-dependency-path == '' }}
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      shell: bash
      run: >
        pip install
        "openwisp-utils[github_actions, qa] @ https://github.com/openwisp/openwisp-utils/archive/refs/heads/master.tar.gz"

    - name: Generate changelog entry
      id: generate
      shell: bash
      env:
        PR_NUMBER: ${{ inputs.pr-number }}
        REPO_NAME: ${{ inputs.repo-name }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
      run: |
        python ${{ github.action_path }}/generate_changelog.py

branding:
  icon: "file-text"
  color: "orange"
