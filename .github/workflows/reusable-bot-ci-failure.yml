name: CI Failure Bot

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      head_repo:
        required: true
        type: string
      base_repo:
        required: true
        type: string
      run_id:
        required: true
        type: string
      pr_author:
        required: true
        type: string
      actor:
        required: true
        type: string
    secrets:
      GEMINI_API_KEY:
        required: true
      APP_ID:
        required: true
      PRIVATE_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Bot Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout Reusable Workflow
        uses: actions/checkout@v6
        with:
          repository: openwisp/openwisp-utils
          ref: fix/ci-failure-bot
          path: trusted_scripts

      - name: Checkout PR Code
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.head_repo }}
          ref: ${{ inputs.head_sha }}
          path: pr_code
          fetch-depth: 1
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Tools
        run: |
          pip install -e "trusted_scripts[github_actions]"

      - name: Fetch Failed Steps Logs
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          RUN_ID: ${{ inputs.run_id }}
          REPO: ${{ inputs.base_repo }}
        run: |
          echo "::group::Debug Environment"
          echo "Target REPO: $REPO"
          echo "Target RUN_ID: $RUN_ID"
          echo "::endgroup::"
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" == "null" ]; then
            echo "::error::RUN_ID is empty or null. Check the caller workflow inputs."
            exit 1
          fi

          set -eo pipefail
          echo "Getting failed jobs for run $RUN_ID..."
          JOB_IDS=$(gh api --paginate repos/$REPO/actions/runs/$RUN_ID/jobs \
            -q '.jobs[]? | select(.conclusion=="failure") | .id')
          if [ -z "$JOB_IDS" ]; then
            echo "No failed jobs found." > failed_logs.txt
            exit 0
          fi
          > failed_logs.txt
          for JOB_ID in $JOB_IDS; do
            echo "Processing job $JOB_ID"
            FAILED_STEPS=$(gh api repos/$REPO/actions/jobs/$JOB_ID \
              -q '.steps[] | select(.conclusion=="failure") | @base64')
            if [ -z "$FAILED_STEPS" ]; then
              echo "No failed steps in job $JOB_ID"
              continue
            fi
            gh api repos/$REPO/actions/jobs/$JOB_ID/logs > job_logs.txt
            echo "===== JOB $JOB_ID =====" >> failed_logs.txt
            for STEP in $FAILED_STEPS; do
              _jq() {
                echo "$STEP" | base64 --decode | jq -r "$1"
              }
              STEP_NAME=$(_jq '.name')
              START=$(_jq '.started_at')
              END=$(_jq '.completed_at | if type=="null" then "9999-12-31T23:59:59Z" else . end')
              echo "Extracting step: $STEP_NAME"
              START_CLEAN=$(echo "$START" | cut -d'.' -f1)
              END_CLEAN=$(echo "$END" | cut -d'.' -f1)
              awk -v start="$START_CLEAN" -v end="$END_CLEAN" '
                {
                  ts = $1
                  sub(/\..*/, "", ts)
                  if (ts >= start && ts <= end)
                    print
                }
              ' job_logs.txt >> failed_logs.txt
              echo "" >> failed_logs.txt
            done
          done

          echo "::group::AI Input Debug"
          cat failed_logs.txt
          echo "::endgroup::"

          if [ ! -s failed_logs.txt ]; then
            echo "Failed jobs found but logs unavailable." > failed_logs.txt
          fi

      - name: Run AI Analysis
        timeout-minutes: 5
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_AUTHOR: ${{ inputs.pr_author }}
          ACTOR: ${{ inputs.actor }}
          COMMIT_SHA: ${{ inputs.head_sha }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: |
          python trusted_scripts/.github/actions/bot-ci-failure/analyze_failure.py > solution.md

      - name: Post Comment
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUM: ${{ inputs.pr_number }}
          REPO: ${{ inputs.base_repo }}
        run: |
          if [ ! -s solution.md ]; then
            echo "AI analysis produced no output; skipping comment."
            exit 0
          fi
          gh pr comment "$PR_NUM" --repo "$REPO" --body-file solution.md
